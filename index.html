<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f172a"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Stock Tracker">
<title>Stock Portfolio Tracker</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#d9e0ea;--blue:#2563eb;--green:#087443;--red:#b42318;--greenbg:#ecfdf3;--redbg:#fef3f2} [data-theme=dark]{--bg:#0b1220;--card:#111827;--text:#f8fafc;--muted:#9ca3af;--line:#2b3648;--blue:#60a5fa;--green:#34d399;--red:#fb7185;--greenbg:#0d2a22;--redbg:#32151a}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}.app{max-width:1080px;margin:auto;padding:calc(18px + env(safe-area-inset-top)) 14px 42px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}h1{margin:0;font-size:32px}.sub{color:var(--muted);font-size:14px;margin-top:4px}.card{background:var(--card);border:1px solid var(--line);border-radius:17px;box-shadow:0 10px 28px rgba(15,23,42,.08)}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.metric{padding:17px}.label{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:800;letter-spacing:.05em}.value{font-size:23px;font-weight:850;margin-top:7px}.positive{color:var(--green)!important}.negative{color:var(--red)!important}.toolbar{display:grid;grid-template-columns:1fr auto auto;gap:10px;padding:13px;margin-bottom:15px}input,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:11px;background:var(--card);color:var(--text);font-size:15px}button{border:0;border-radius:11px;padding:12px 14px;font-weight:800;cursor:pointer}.primary{background:var(--blue);color:#fff}.secondary{background:transparent;color:var(--text);border:1px solid var(--line)}.danger{background:var(--redbg);color:var(--red)}.icon{width:44px;height:44px;padding:0;font-size:20px}.holdings{display:grid;gap:13px}.stock{padding:16px}.stockhead{display:flex;justify-content:space-between;gap:10px}.ticker{font-size:22px;font-weight:900}.name{font-size:13px;color:var(--muted)}.chip{padding:8px 10px;border-radius:999px;font-size:13px;font-weight:850}.chip.positive{background:var(--greenbg)}.chip.negative{background:var(--redbg)}.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:14px}.small{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:800}.big{font-size:15px;font-weight:850;margin-top:4px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.modal{display:none;position:fixed;inset:0;background:rgba(2,6,23,.6);z-index:10;align-items:flex-end;justify-content:center;padding:12px}.modal.open{display:flex}.sheet{width:min(760px,100%);max-height:92vh;overflow:auto;background:var(--card);border-radius:20px;padding:17px;border:1px solid var(--line)}.mhead{display:flex;justify-content:space-between;align-items:center}.mtitle{font-size:21px;font-weight:900}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin:0 0 5px 2px}.purchases{border-top:1px solid var(--line);margin-top:14px;padding-top:14px}.prow{display:grid;grid-template-columns:1.2fr .8fr .8fr auto;gap:8px;align-items:end;margin-bottom:8px}.empty{text-align:center;color:var(--muted);padding:34px;border:1px dashed var(--line);border-radius:15px}.footer{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}.note{font-size:12px;color:var(--muted);margin-top:10px}@media(max-width:850px){.summary{grid-template-columns:1fr 1fr}.grid{grid-template-columns:repeat(3,1fr)}}@media(max-width:600px){.toolbar{grid-template-columns:1fr 1fr}.toolbar input{grid-column:1/-1}.grid{grid-template-columns:1fr 1fr}.form{grid-template-columns:1fr}.prow{grid-template-columns:1fr 1fr}.prow .wide{grid-column:1/-1}.value{font-size:20px}}
</style></head>
<body><div class="app">
<div class="top"><div><h1>Stock Portfolio</h1><div class="sub">Break-even, commissions, and profit — saved on this device.</div></div><button class="secondary icon" onclick="toggleTheme()">◐</button></div>
<div class="summary"><div class="card metric"><div class="label">Portfolio Value</div><div class="value" id="pv">$0.00</div></div><div class="card metric"><div class="label">Total Cost</div><div class="value" id="pc">$0.00</div></div><div class="card metric"><div class="label">Net Profit/Loss</div><div class="value" id="pp">$0.00</div></div><div class="card metric"><div class="label">Return</div><div class="value" id="pr">0.00%</div></div></div>
<div class="card toolbar"><input id="search" placeholder="Search ticker or company" oninput="render()"><button class="secondary" onclick="openSettings()">Settings</button><button class="primary" onclick="openStock()">+ Add Stock</button></div>
<div id="holdings" class="holdings"></div>
<div class="footer"><button class="secondary" onclick="exportData()">Export Backup</button><button class="secondary" onclick="document.getElementById('import').click()">Import Backup</button><input id="import" type="file" accept=".json" hidden onchange="importData(event)"><button class="danger" onclick="clearAll()">Clear All</button></div><div class="note">Prices are entered manually. Data remains in your browser.</div>
</div>
<div id="stockModal" class="modal"><div class="sheet"><div class="mhead"><div class="mtitle" id="modalTitle">Add Stock</div><button class="secondary" onclick="closeStock()">Close</button></div><div class="form"><div><label>Ticker</label><input id="ticker"></div><div><label>Company Name</label><input id="company"></div><div><label>Current Price per Share</label><input id="current" type="number" step="0.01"></div><div><label>Sale Commission</label><input id="sellComm" type="number" step="0.01"></div></div><div class="purchases"><div class="mtitle" style="font-size:16px">Purchases</div><div id="rows"></div><button class="secondary" onclick="addRow()">+ Add Purchase</button></div><div class="actions" style="justify-content:flex-end"><button class="secondary" onclick="closeStock()">Cancel</button><button class="primary" onclick="saveStock()">Save Stock</button></div></div></div>
<div id="settingsModal" class="modal"><div class="sheet"><div class="mhead"><div class="mtitle">Settings</div><button class="secondary" onclick="closeSettings()">Close</button></div><div class="form"><div><label>Currency</label><select id="currency"><option>CAD</option><option>USD</option><option>EUR</option><option>GBP</option></select></div><div><label>Default Buy Commission</label><input id="buyDefault" type="number" step="0.01"></div><div><label>Default Sale Commission</label><input id="sellDefault" type="number" step="0.01"></div></div><div class="actions" style="justify-content:flex-end"><button class="primary" onclick="saveSettings()">Save Settings</button></div></div></div>
<script>
const KEY='stockPortfolioTrackerV2',THEME='stockPortfolioTheme';let editing=null;function uid(){return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())}function defaults(){return{settings:{currency:'CAD',buy:6.95,sell:6.95},stocks:[{id:uid(),ticker:'MU',name:'Micron Technology',current:1048.93,sellCommission:6.95,purchases:[{price:1078,qty:1,commission:6.95},{price:1049,qty:1,commission:6.95},{price:992,qty:1,commission:6.95}]}]}}let state=(()=>{try{return JSON.parse(localStorage.getItem(KEY))||defaults()}catch{return defaults()}})();function save(){localStorage.setItem(KEY,JSON.stringify(state))}function money(v){return new Intl.NumberFormat('en-CA',{style:'currency',currency:state.settings.currency}).format(Number(v)||0)}function calc(s){let shares=0,pv=0,bc=0;s.purchases.forEach(p=>{shares+=Number(p.qty)||0;pv+=(Number(p.price)||0)*(Number(p.qty)||0);bc+=Number(p.commission)||0});let cost=pv+bc,be=shares?(cost+Number(s.sellCommission||0))/shares:0,value=shares*Number(s.current||0),profit=value-Number(s.sellCommission||0)-cost,ret=cost?profit/cost*100:0;return{shares,cost,be,value,profit,ret,avg:shares?pv/shares:0,avgCost:shares?cost/shares:0}}function esc(x){return String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function render(){let q=document.getElementById('search').value.toLowerCase(),h=document.getElementById('holdings'),items=state.stocks.filter(s=>s.ticker.toLowerCase().includes(q)||(s.name||'').toLowerCase().includes(q));h.innerHTML=items.length?items.map(s=>{let c=calc(s),cl=c.profit>=0?'positive':'negative';return`<div class="card stock"><div class="stockhead"><div><div class="ticker">${esc(s.ticker)}</div><div class="name">${esc(s.name||'No company name')}</div></div><div class="chip ${cl}">${money(c.profit)} · ${c.ret.toFixed(2)}%</div></div><div class="grid"><div><div class="small">Shares</div><div class="big">${c.shares}</div></div><div><div class="small">Current Price</div><div class="big">${money(s.current)}</div></div><div><div class="small">Average Buy</div><div class="big">${money(c.avg)}</div></div><div><div class="small">Average Cost</div><div class="big">${money(c.avgCost)}</div></div><div><div class="small">Break-Even</div><div class="big">${money(c.be)}</div></div><div><div class="small">Market Value</div><div class="big">${money(c.value)}</div></div></div><div class="actions"><button class="secondary" onclick="quickPrice('${s.id}')">Update Price</button><button class="secondary" onclick="openStock('${s.id}')">Edit</button><button class="danger" onclick="del('${s.id}')">Delete</button></div></div>`}).join(''):'<div class="empty">No holdings found.</div>';summary()}function summary(){let v=0,cost=0,p=0;state.stocks.forEach(s=>{let x=calc(s);v+=x.value;cost+=x.cost;p+=x.profit});let r=cost?p/cost*100:0;document.getElementById('pv').textContent=money(v);document.getElementById('pc').textContent=money(cost);setSign('pp',money(p),p);setSign('pr',r.toFixed(2)+'%',r)}function setSign(id,t,v){let e=document.getElementById(id);e.textContent=t;e.classList.remove('positive','negative');e.classList.add(v>=0?'positive':'negative')}function addRow(p={}){let d=document.createElement('div');d.className='prow';d.innerHTML=`<div class="wide"><label>Price per Share</label><input class="price" type="number" step="0.01" value="${p.price??''}"></div><div><label>Shares</label><input class="qty" type="number" step="0.0001" value="${p.qty??1}"></div><div><label>Commission</label><input class="comm" type="number" step="0.01" value="${p.commission??state.settings.buy}"></div><button class="danger" onclick="this.parentElement.remove()">Remove</button>`;document.getElementById('rows').appendChild(d)}function openStock(id=null){editing=id;document.getElementById('rows').innerHTML='';if(id){let s=state.stocks.find(x=>x.id===id);document.getElementById('modalTitle').textContent='Edit Stock';ticker.value=s.ticker;company.value=s.name||'';current.value=s.current;sellComm.value=s.sellCommission;s.purchases.forEach(addRow)}else{document.getElementById('modalTitle').textContent='Add Stock';ticker.value='';company.value='';current.value='';sellComm.value=state.settings.sell;addRow()}stockModal.classList.add('open')}function closeStock(){stockModal.classList.remove('open');editing=null}function saveStock(){let t=ticker.value.trim().toUpperCase(),ps=[...document.querySelectorAll('.prow')].map(r=>({price:Number(r.querySelector('.price').value),qty:Number(r.querySelector('.qty').value),commission:Number(r.querySelector('.comm').value)})).filter(p=>p.qty>0&&p.price>=0&&p.commission>=0);if(!t)return alert('Enter a ticker.');if(!ps.length)return alert('Add a valid purchase.');let s={id:editing||uid(),ticker:t,name:company.value.trim(),current:Number(current.value)||0,sellCommission:Number(sellComm.value)||0,purchases:ps};if(editing)state.stocks[state.stocks.findIndex(x=>x.id===editing)]=s;else state.stocks.push(s);save();closeStock();render()}function quickPrice(id){let s=state.stocks.find(x=>x.id===id),v=prompt(`Enter current price for ${s.ticker}:`,s.current);if(v===null)return;v=Number(v);if(!Number.isFinite(v)||v<0)return alert('Enter a valid price.');s.current=v;save();render()}function del(id){let s=state.stocks.find(x=>x.id===id);if(confirm(`Delete ${s.ticker}?`)){state.stocks=state.stocks.filter(x=>x.id!==id);save();render()}}function openSettings(){currency.value=state.settings.currency;buyDefault.value=state.settings.buy;sellDefault.value=state.settings.sell;settingsModal.classList.add('open')}function closeSettings(){settingsModal.classList.remove('open')}function saveSettings(){state.settings={currency:currency.value,buy:Number(buyDefault.value)||0,sell:Number(sellDefault.value)||0};save();closeSettings();render()}function exportData(){let b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='stock-portfolio-backup.json';a.click();URL.revokeObjectURL(u)}function importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let x=JSON.parse(r.result);if(!x.settings||!Array.isArray(x.stocks))throw 0;state=x;save();render();alert('Backup imported.')}catch{alert('Invalid backup file.')}};r.readAsText(f);e.target.value=''}function clearAll(){if(confirm('Delete all saved data?')){state=defaults();save();render()}}function toggleTheme(){let n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem(THEME,n)}document.documentElement.setAttribute('data-theme',localStorage.getItem(THEME)||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));render();
</script></body></html>
